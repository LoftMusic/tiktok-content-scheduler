<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      width: 380px;
      min-height: 500px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      padding: 16px;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 8px;
    }
    
    /* Mode Switch */
    .mode-switch {
      display: flex;
      gap: 8px;
    }
    
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: transparent;
      color: white;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .mode-btn:hover {
      border-color: rgba(255,255,255,0.4);
    }
    
    .mode-btn.active {
      background: #6b46c1;
      border-color: #6b46c1;
    }
    
    .mode-btn.loop-mode.active {
      background: #e67e22;
      border-color: #e67e22;
    }
    
    /* Category Grid */
    #categories {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    
    #categories.loop-active {
      display: none !important;
    }
    
    #loopCategories {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    
    #loopCategories.loop-active {
      display: grid !important;
    }
    
    .hidden {
      display: none !important;
    }
    
    .cat-btn {
      padding: 8px 4px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .cat-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .cat-btn.active {
      background: #6b46c1;
      box-shadow: 0 2px 8px rgba(107, 70, 193, 0.4);
    }
    
    /* Filename input */
    .filename-input {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 13px;
    }
    
    .filename-input::placeholder {
      opacity: 0.5;
    }
    
    /* Record Button */
    .record-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .record-btn.idle {
      background: #e74c3c;
      color: white;
    }
    
    .record-btn.idle:hover {
      background: #c0392b;
    }
    
    .record-btn.recording {
      background: #f39c12;
      color: white;
      animation: pulse 1.5s infinite;
    }
    
    .record-btn.processing {
      background: #3498db;
      color: white;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(243, 156, 18, 0); }
    }
    
    /* Status */
    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      background: rgba(255,255,255,0.05);
    }
    
    .status.success { background: rgba(46, 204, 113, 0.2); }
    .status.error { background: rgba(231, 76, 60, 0.2); }
    .status.info { background: rgba(52, 152, 219, 0.2); }
    
    /* Actions */
    .actions {
      display: flex;
      gap: 8px;
    }
    
    .action-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Settings */
    .setting-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .setting-row label {
      flex: 1;
      font-size: 12px;
    }
    
    .setting-row input[type="range"] {
      flex: 2;
    }
    
    .setting-value {
      font-size: 11px;
      opacity: 0.7;
      min-width: 40px;
    }
    
    /* Last Recording */
    .last-recording {
      background: rgba(107, 70, 193, 0.2);
      border-radius: 6px;
      padding: 10px;
      font-size: 11px;
    }
    
    .last-recording strong {
      color: #a78bfa;
    }
    
    /* Timer */
    .timer {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      padding: 8px;
      font-family: 'Consolas', monospace;
    }
    
    .timer.recording {
      color: #f39c12;
    }
  </style>
</head>
<body>
  <h1>🎵 Audio Recorder</h1>
  
  <!-- Mode Selection -->
  <div class="section">
    <div class="section-title">Mode</div>
    <div class="mode-switch" id="modeSwitch">
      <button class="mode-btn active" data-mode="oneshot">ONE SHOT</button>
      <button class="mode-btn" data-mode="loop">LOOP</button>
    </div>
  </div>
  
  <!-- Category Selection -->
  <div class="section">
    <div class="section-title">Category</div>
    <div class="categories" id="categories">
      <button class="cat-btn active" data-cat="kick">KICK</button>
      <button class="cat-btn" data-cat="snare">SNARE</button>
      <button class="cat-btn" data-cat="hihat">HIHAT</button>
      <button class="cat-btn" data-cat="tom">TOM</button>
      <button class="cat-btn" data-cat="clap">CLAP</button>
      <button class="cat-btn" data-cat="perc">PERC</button>
      <button class="cat-btn" data-cat="fx">FX</button>
      <button class="cat-btn" data-cat="vocal">VOCAL</button>
      <button class="cat-btn" data-cat="other">OTHER</button>
    </div>
    
    <!-- Loop Categories (hidden by default) -->
    <div class="categories" id="loopCategories" style="display: none;">
      <button class="cat-btn active" data-cat="fulldrums">FULL DRUMS</button>
      <button class="cat-btn" data-cat="drumtops">DRUM TOPS</button>
      <button class="cat-btn" data-cat="kicks">KICKS</button>
      <button class="cat-btn" data-cat="snares">SNARES</button>
      <button class="cat-btn" data-cat="hihats">HIHATS</button>
      <button class="cat-btn" data-cat="percussion">PERCUSSION</button>
      <button class="cat-btn" data-cat="bass">BASS</button>
      <button class="cat-btn" data-cat="melody">MELODY</button>
      <button class="cat-btn" data-cat="fxloop">FX</button>
      <button class="cat-btn" data-cat="vocals">VOCALS</button>
    </div>
  </div>
  
  <!-- Filename -->
  <div class="section">
    <div class="section-title">Filename (optional)</div>
    <input type="text" class="filename-input" id="filename" placeholder="Auto-generated if empty...">
  </div>
  
  <!-- Timer -->
  <div class="timer" id="timer">00:00.00</div>
  
  <!-- Record Button -->
  <button class="record-btn idle" id="recordBtn">
    ⏺ START RECORDING
  </button>
  
  <!-- Status -->
  <div class="status info" id="status">Ready - Play a sample then click Start</div>
  
  <!-- Last Recording -->
  <div class="last-recording" id="lastRecording" style="display: none;">
    <strong>Last:</strong> <span id="lastName">-</span>
    <br><strong>Duration:</strong> <span id="lastDuration">-</span>
  </div>
  
  <!-- Actions -->
  <div class="actions" style="margin-top: 12px;">
    <button class="action-btn" id="playBtn" disabled>▶ Play Last</button>
    <button class="action-btn" id="openBtn">📁 Open Folder</button>
  </div>
  
  <!-- Settings -->
  <div class="section" style="margin-top: 12px;">
    <div class="section-title">Settings</div>
    <div class="setting-row">
      <label>Silence Threshold</label>
      <input type="range" id="threshold" min="-60" max="-20" value="-40">
      <span class="setting-value" id="thresholdVal">-40dB</span>
    </div>
    <div class="setting-row">
      <label>Max Duration</label>
      <input type="range" id="maxDuration" min="5" max="60" value="30">
      <span class="setting-value" id="durationVal">30s</span>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
