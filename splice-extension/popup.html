<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #6b46c1;
    }
    .sample-info {
      background: #f7f5ff;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .sample-name {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .sample-id {
      font-size: 11px;
      color: #666;
      font-family: monospace;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    #downloadBtn {
      background: #6b46c1;
      color: white;
    }
    #downloadBtn:hover {
      background: #553c9a;
    }
    #downloadBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #batchBtn {
      background: #48bb78;
      color: white;
    }
    #batchBtn:hover {
      background: #38a169;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .status.success {
      background: #c6f6d5;
      color: #276749;
    }
    .status.error {
      background: #fed7d7;
      color: #c53030;
    }
    .status.info {
      background: #bee3f8;
      color: #2b6cb0;
    }
    .hidden {
      display: none;
    }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>🎵 Splice Downloader</h2>
  
  <div id="sampleInfo" class="sample-info hidden">
    <div class="sample-name" id="sampleName">-</div>
    <div class="sample-id" id="sampleId">-</div>
  </div>
  
  <button id="downloadBtn" disabled>Download Current Sample</button>
  <button id="batchBtn">Download All From Page</button>
  
  <div id="status" class="status hidden"></div>
  
  <div class="settings">
    <label>
      <span>Format:</span>
      <select id="format">
        <option value="mp3">MP3 (preview quality)</option>
        <option value="wav">WAV (if available)</option>
      </select>
    </label>
    <label>
      <span>Filename prefix:</span>
      <input type="text" id="prefix" placeholder="splice_">
    </label>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
